<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-orb orb-left" aria-hidden="true"></div>
    <div class="bg-orb orb-right" aria-hidden="true"></div>

    <main class="layout">
      <section class="hero card reveal">
        <p class="eyebrow">Task 3</p>
        <h1>Student Login Portal</h1>
        <p class="subtext">
          Register and login with a focused, modern interface connected to your
          Express, MongoDB, and session-based backend.
        </p>
        <div class="status-wrap">
          <span class="status-label">Session</span>
          <span id="sessionStatus" class="status-chip">Checking...</span>
        </div>
      </section>

      <section class="card reveal delay-1">
        <h2>Create Account</h2>
        <form id="registerForm" class="auth-form">
          <label>
            Username
            <input type="text" name="username" required minlength="3" />
          </label>
          <label>
            Password
            <input type="password" name="password" required minlength="3" />
          </label>
          <button type="submit">Register</button>
        </form>
      </section>

      <section class="card reveal delay-2">
        <h2>Login</h2>
        <form id="loginForm" class="auth-form">
          <label>
            Username
            <input type="text" name="username" required minlength="3" />
          </label>
          <label>
            Password
            <input type="password" name="password" required minlength="3" />
          </label>
          <button type="submit">Login</button>
        </form>
      </section>

      <section class="card reveal delay-3">
        <h2>Dashboard</h2>
        <p id="dashboardMessage" class="dashboard-message">
          Login first, then fetch your welcome message.
        </p>
        <div class="actions">
          <button id="dashboardBtn" class="alt-btn" type="button">
            Open Dashboard
          </button>
          <button id="logoutBtn" class="ghost-btn" type="button">Logout</button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
